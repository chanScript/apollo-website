<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#142838;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3D54;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DB8B2;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4DB8B2;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="16"/>
  <circle cx="500" cy="80" r="160" fill="url(#accent)"/>
  <circle cx="80" cy="340" r="100" fill="url(#accent)"/>
  <!-- Magnifying glass -->
  <g transform="translate(185, 80)">
    <circle cx="100" cy="100" r="72" fill="none" stroke="#4DB8B2" stroke-width="10"/>
    <line x1="153" y1="153" x2="200" y2="200" stroke="#4DB8B2" stroke-width="12" stroke-linecap="round"/>
    <!-- Document lines inside -->
    <line x1="70" y1="80" x2="130" y2="80" stroke="#4DB8B2" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <line x1="70" y1="100" x2="130" y2="100" stroke="#4DB8B2" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <line x1="70" y1="120" x2="110" y2="120" stroke="#4DB8B2" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  </g>
  <text x="300" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#4DB8B2" letter-spacing="1">Credit Investigation</text>
  <text x="300" y="368" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8BAFC4" letter-spacing="0.5">In-depth financial history assessment</text>
</svg>
