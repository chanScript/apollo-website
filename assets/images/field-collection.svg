    <path d="M20 180 C20 145 45 125 70 125 C95 125 120 145 120 180" fill="none" stroke="#4DB8B2" stroke-width="7" stroke-linecap="round"/>
    <!-- Person 2 -->
    <circle cx="140" cy="55" r="22" fill="none" stroke="#4DB8B2" stroke-width="5" opacity="0.6"/>
    <path d="M100 175 C100 148 118 132 140 132 C162 132 180 148 180 175" fill="none" stroke="#4DB8B2" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>
  <text x="300" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#4DB8B2" letter-spacing="1">Field Collection</text>
  <text x="300" y="368" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8BAFC4" letter-spacing="0.5">On-site debt negotiation &amp; recovery</text>
