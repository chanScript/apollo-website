<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#142838;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3D54;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DB8B2;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4DB8B2;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="16"/>
  <circle cx="500" cy="80" r="160" fill="url(#accent)"/>
  <circle cx="80" cy="340" r="100" fill="url(#accent)"/>
  <!-- Car / vehicle icon -->
  <g transform="translate(130, 130)">
    <!-- Car body -->
    <rect x="0" y="70" width="340" height="80" rx="12" fill="none" stroke="#4DB8B2" stroke-width="8"/>
    <!-- Car roof -->
    <path d="M60 70 L90 20 L250 20 L280 70" fill="none" stroke="#4DB8B2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Windows -->
    <rect x="95" y="26" width="60" height="40" rx="6" fill="none" stroke="#4DB8B2" stroke-width="5" opacity="0.5"/>
    <rect x="168" y="26" width="70" height="40" rx="6" fill="none" stroke="#4DB8B2" stroke-width="5" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="72" cy="155" r="32" fill="none" stroke="#4DB8B2" stroke-width="8"/>
    <circle cx="72" cy="155" r="12" fill="#4DB8B2" opacity="0.4"/>
    <circle cx="268" cy="155" r="32" fill="none" stroke="#4DB8B2" stroke-width="8"/>
    <circle cx="268" cy="155" r="12" fill="#4DB8B2" opacity="0.4"/>
  </g>
  <text x="300" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#4DB8B2" letter-spacing="1">Vehicle Repossession</text>
  <text x="300" y="385" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8BAFC4" letter-spacing="0.5">Lawful auto loan asset recovery</text>
</svg>
